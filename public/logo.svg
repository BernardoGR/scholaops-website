<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 148 22"
  width="148"
  height="22"
  fill="none"
  role="img"
  aria-label="scholaops.ai"
>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap');
    ]]></style>
  </defs>

  <!-- mark: rounded square + lime diamond + center dot -->
  <rect width="22" height="22" rx="7" fill="#0E0D0A"/>
  <rect
    x="4" y="4" width="14" height="14" rx="2.5"
    fill="#D7F26B"
    transform="rotate(45, 11, 11) translate(11, 11) scale(0.9) translate(-11, -11)"
  />
  <circle cx="11" cy="11" r="2.5" fill="#0E0D0A"/>

  <!-- wordmark -->
  <text
    x="30"
    y="11"
    dominant-baseline="central"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="16"
    font-weight="600"
    letter-spacing="-0.16"
  ><tspan fill="#0E0D0A">scholaops</tspan><tspan fill="#6B6660">.ai</tspan></text>
</svg>
