<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- rounded square background -->
  <rect width="32" height="32" rx="10" fill="#0E0D0A"/>
  <!-- lime diamond (14×14 inset rect, rotated 45°, scaled 0.9, centered) -->
  <rect
    x="5.8" y="5.8" width="20.4" height="20.4" rx="3.6"
    fill="#D7F26B"
    transform="rotate(45, 16, 16) translate(16, 16) scale(0.9) translate(-16, -16)"
  />
  <!-- center dot (cuts through diamond) -->
  <circle cx="16" cy="16" r="3.6" fill="#0E0D0A"/>
</svg>
